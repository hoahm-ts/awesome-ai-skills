name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest # self-hosted-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: src
          args: --new-from-rev=origin/main --timeout=5m --config .golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest # self-hosted-cpu
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Run tests with coverage
        working-directory: src
        run: make test

      - name: Generate coverage summary
        id: coverage
        working-directory: src
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')
          echo "total=${COVERAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "## 🧪 Test Coverage: ${COVERAGE}"
            echo ""
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.total }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              '## 🧪 Test Coverage',
              '',
              `**Total coverage: \`${coverage}\`**`,
              '',
              `For the full per-package breakdown, see the [workflow run summary](${runUrl}).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🧪 Test Coverage';
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/coverage.out
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
