name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest # self-hosted-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: src
          args: --new-from-rev=origin/main --timeout=5m --config .golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest # self-hosted-cpu
    permissions:
      contents: read
      pull-requests: write
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Run tests with coverage
        id: coverage
        working-directory: src
        run: |
          go vet ./...
          go test -coverprofile=coverage.out -covermode=atomic ./internal/... ./pkg/...
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')
          echo "percentage=${COVERAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "## 📊 Test Coverage: \`${COVERAGE}\`"
            echo ""
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            go tool cover -func=coverage.out | grep -v '^total:' | awk '{print "| `" $1 "` | " $3 " |"}'
            echo ""
            echo "**Total: \`${COVERAGE}\`**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE: ${{ steps.coverage.outputs.percentage }}
        with:
          script: |
            const marker = '<!-- go-coverage-report -->';
            const coverage = process.env.COVERAGE;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## 📊 Test Coverage',
              '',
              '| Total Coverage |',
              '|:-:|',
              `| **\`${coverage}\`** |`,
              '',
              `_Updated by the [Test](${runUrl}) workflow._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: src/coverage.out
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest # self-hosted-cpu
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Update coverage badge on badges branch
        uses: actions/github-script@v7
        env:
          COVERAGE: ${{ needs.test.outputs.coverage }}
        with:
          script: |
            const coverage = process.env.COVERAGE;
            const pct = parseFloat(coverage.replace('%', ''));
            const color = pct >= 90 ? 'brightgreen' : pct >= 75 ? 'green' : pct >= 60 ? 'yellow' : 'red';
            const badge = {
              schemaVersion: 1,
              label: 'coverage',
              message: coverage,
              color,
            };
            const content = Buffer.from(JSON.stringify(badge, null, 2) + '\n').toString('base64');
            const path = '.github/badges/coverage.json';
            const branch = 'badges';

            // Ensure the badges branch exists; create it from main if not.
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
            } catch (err) {
              if (err.status === 404) {
                const { data: mainRef } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'heads/main',
                });
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/heads/${branch}`,
                  sha: mainRef.object.sha,
                });
              } else {
                throw err;
              }
            }

            // Resolve the sha of the existing file (if any).
            let fileSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              fileSha = data.sha;
            } catch (err) {
              if (err.status !== 404) {
                throw err;
              }
              // File does not exist yet — will be created below.
            }

            // Create or update the badge JSON file.
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: update coverage badge [skip ci]',
              content,
              ...(fileSha ? { sha: fileSha } : {}),
              branch,
            });

