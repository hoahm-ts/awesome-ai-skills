linters:
  disable-all: true
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - copyloopvar
    - gochecknoinits
    - goconst
    - gocyclo
    - gofmt
    - revive
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - staticcheck
    - unused
    - stylecheck
    - tparallel
    - typecheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  gofmt:
    rewrite-rules:
      - pattern: 'interface{}'
        replacement: 'any'
  gocritic:
    disabled-checks:
      - ifElseChain
  dogsled:
    max-blank-identifiers: 3

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - ineffassign
        - revive
    - path: \.go
      linters:
        - goconst
        - nakedret
        - typecheck
        - gofmt

run:
  timeout: 10m
