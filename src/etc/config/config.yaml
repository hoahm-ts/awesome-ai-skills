APP_NAME=awesome-ai-skills
APP_ENV=development
APP_PORT=8080
LOG_LEVEL=info
APP_READ_TIMEOUT_SECONDS=15
APP_WRITE_TIMEOUT_SECONDS=15
APP_IDLE_TIMEOUT_SECONDS=60
APP_SHUTDOWN_TIMEOUT_SECONDS=30

# PostgreSQL — set DATABASE_DSN (full URL) OR the per-field vars below.
DATABASE_DSN=
DB_HOST=localhost
DB_PORT=5432
DB_NAME=awesome_ai_skills
DB_USER=postgres
DB_PASSWORD=
# TLS/SSL — follows GCP Cloud SQL and AWS RDS best practices.
# DB_SSL_MODE: disable | require | verify-ca | verify-full
DB_SSL_MODE=disable
DB_SSL_CERT=
DB_SSL_KEY=
DB_SSL_ROOT_CERT=

# Redis
REDIS_ADDR=localhost:6379
REDIS_PASSWORD=

# Kafka
KAFKA_BROKER=localhost:9092
KAFKA_GROUP_ID=awesome-ai-skills

# Temporal
TEMPORAL_HOST_PORT=localhost:7233
TEMPORAL_NAMESPACE=default
TEMPORAL_TASK_QUEUE=default

# Datadog (DD_SERVICE is not used; datadog.service reads from APP_NAME above)
DD_ENV=development
DD_AGENT_HOST=localhost
